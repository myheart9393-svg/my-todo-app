<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>나의 할 일 목록</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <div class="card">
      <!-- 제목 -->
      <h1 class="title">나의 할 일 목록</h1>

      <!-- 입력 영역 -->
      <div class="input-area">
        <input
          type="text"
          class="todo-input"
          placeholder="할 일을 입력하세요"
        />
        <button class="add-btn">추가</button>
      </div>

      <!-- 할 일 개수 표시 -->
      <div class="count-bar">
        <span class="count-total">전체 0개</span>
        <span class="count-done">완료 0개</span>
      </div>

      <!-- 필터 버튼 -->
      <div class="filter-bar">
        <button class="filter-btn active" data-filter="all">전체</button>
        <button class="filter-btn" data-filter="active">진행중</button>
        <button class="filter-btn" data-filter="completed">완료</button>
      </div>

      <!-- 할 일 목록 -->
      <ul class="todo-list"></ul>

      <!-- 완료 항목 일괄 삭제 -->
      <button class="clear-done-btn" disabled>완료된 항목 삭제</button>
    </div>
  </div>
  <script src="main.js"></script>
</body>
</html>
